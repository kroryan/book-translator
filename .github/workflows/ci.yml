name: Book Translator CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  PYTHON_VERSION: "3.12"

permissions:
  contents: write

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.10.0 flake8==7.1.1 isort==7.0.0 mypy==1.13.0
      
      - name: Check formatting with Black
        run: black --check book_translator/ tests/
      
      - name: Check import sorting
        run: isort --check-only book_translator/ tests/
      
      - name: Lint with flake8
        run: |
          flake8 book_translator/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 book_translator/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

  test:
    name: Tests
    runs-on: ${{ matrix.os }}
    needs: lint
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock
      
      - name: Run tests
        env:
          BOOK_TRANSLATOR_ENV: testing
          VERBOSE_DEBUG: "false"
        run: |
          pytest tests/ -v --cov=book_translator --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: Run Bandit security scan
        run: bandit -r book_translator/ -ll --format json -o bandit-report.json || true
      
      - name: Check dependencies for vulnerabilities
        run: safety check -r requirements.txt --output json > safety-report.json || true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v6
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  build-executable:
    name: Build Executable (Windows)
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build executable
        run: |
          pyinstaller --clean book_translator_onefile.spec
      
      - name: Test executable exists
        run: |
          if (Test-Path "dist/BookTranslator.exe") {
            Write-Host "✅ Executable built successfully"
          } else {
            Write-Error "❌ Executable not found"
            exit 1
          }
        shell: pwsh
      
      - name: Upload executable
        uses: actions/upload-artifact@v6
        with:
          name: BookTranslator-Windows
          path: dist/BookTranslator.exe
          retention-days: 30

  build-appimage:
    name: Build AppImage (Linux)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Linux executable
        run: |
          pyinstaller --clean book_translator_onefile.spec
      
      - name: Create AppDir
        run: |
          mkdir -p BookTranslator.AppDir
          cp dist/BookTranslator BookTranslator.AppDir/BookTranslator
          chmod +x BookTranslator.AppDir/BookTranslator
          
          python -c "
          from PIL import Image
          img = Image.open('app_icon.ico')
          img.save('BookTranslator.AppDir/BookTranslator.png')
          "
          cp BookTranslator.AppDir/BookTranslator.png BookTranslator.AppDir/.DirIcon
          
          cat << 'EOF' > BookTranslator.AppDir/BookTranslator.desktop
          [Desktop Entry]
          Type=Application
          Name=Book Translator
          Comment=Book Translator - Desktop Edition
          Exec=BookTranslator
          Icon=BookTranslator
          Categories=Utility;
          Terminal=false
          EOF
          
          cd BookTranslator.AppDir
          ln -s BookTranslator AppRun
          cd ..
          
      - name: Build AppImage
        run: |
          curl -Lo appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ARCH=x86_64 ./squashfs-root/AppRun BookTranslator.AppDir BookTranslator-x86_64.AppImage
          
      - name: Upload AppImage
        uses: actions/upload-artifact@v6
        with:
          name: BookTranslator-Linux
          path: BookTranslator-x86_64.AppImage
          retention-days: 30

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: book-translator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-executable, build-appimage, build-docker]
    if: github.event_name == 'release'
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download Windows Executable
        uses: actions/download-artifact@v8
        with:
          name: BookTranslator-Windows
          path: artifacts/
          
      - name: Download Linux AppImage
        uses: actions/download-artifact@v8
        with:
          name: BookTranslator-Linux
          path: artifacts/
      
      - name: Upload release assets
        run: |
          gh release upload "${{ github.event.release.tag_name }}" artifacts/BookTranslator.exe --clobber
          gh release upload "${{ github.event.release.tag_name }}" artifacts/BookTranslator-x86_64.AppImage --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prerelease:
    name: Publish Continuous Pre-release
    runs-on: ubuntu-latest
    needs: [build-executable, build-appimage]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Download Windows Executable
        uses: actions/download-artifact@v8
        with:
          name: BookTranslator-Windows
          path: artifacts/
          
      - name: Download Linux AppImage
        uses: actions/download-artifact@v8
        with:
          name: BookTranslator-Linux
          path: artifacts/
          
      - name: Publish Pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing 'continuous' release and tag remotely if they exist
          gh release delete continuous --yes --cleanup-tag || true
          
          # Wait a moment for GitHub tag deletion to propagate
          sleep 3
          
          # Create new pre-release with tag 'continuous'
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          DATE_STR="$(date -u +'%Y/%m/%d, %H:%M')"
          
          gh release create continuous \
            --title "Continuous Build" \
            --notes "$(printf "Triggered on %s UTC by commit %s (@%s)\n\nThis is an automated build of the latest source. It may be unstable or even crash, corrupt your save or eat your kitten. Use with caution!" "${DATE_STR}" "${SHORT_SHA}" "${{ github.actor }}")" \
            --prerelease \
            artifacts/BookTranslator.exe \
            artifacts/BookTranslator-x86_64.AppImage
